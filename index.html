<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caffe Noir</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome//6.7.2/css/all.min.css" />
    <link rel="shortcut icon" href="CofeeMedia/logo.png" type="image/x-icon">
</head>

<body>
    <div class="nav">
        <div class="left">
            <div class="logo"></div>
            <h1 class="heading">Caffe Noir</h1>
        </div>
        <div class="mid">
            <nav>
                <ul>
                    <li>Shop</li>
                    <li>Origin</li>
                    <li>Brawing</li>
                    <li>About</li>
                </ul>
            </nav>
        </div>
        <div class="right">
            <button class="order btnarrow">ORDER NOW <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>
    <section id="hero">
        <div class="hero-cnt">
            <h1 class="artisian">Artisian Roast,</h1>
            <h1 class="deliver">Delivered to <br>your footsteps</h1>
            <p>Experience the ritual of specialty coffee. Sourced from the world's most renowned estates and roasted in
                small batches to reveal unique flavor profiles.</p>
            <div class="buttons">
                <button class="explore btn btnarrow">Explore Beans <i class="fa-solid fa-arrow-right"></i></button>
                <button class="explore btn btnarrow">Our Story <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>
        <div class="coffee-img"></div>
    </section>
</body>

</html>
